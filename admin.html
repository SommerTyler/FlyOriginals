<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – FlyOriginals</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="preload" href="fonts/made-tommy-regular.otf" as="font" type="font/otf" crossorigin>
  <link rel="preload" href="fonts/made-tommy-bold.otf" as="font" type="font/otf" crossorigin>
  <style>
    @font-face { font-family: 'MadeTommy'; src: url('fonts/made-tommy-light.otf') format('opentype'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'MadeTommy'; src: url('fonts/made-tommy-regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'MadeTommy'; src: url('fonts/made-tommy-medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'MadeTommy'; src: url('fonts/made-tommy-bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
    @font-face { font-family: 'BabyDoll'; src: url('fonts/baby-doll.otf') format('opentype'); font-weight: 400; font-display: swap; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0d0005; --maroon: #3B0010; --red: #CC1020;
      --white: #FAF5EF; --gray: #1a0a0f; --border: rgba(204,16,32,0.2);
      --surface: rgba(20,4,10,0.85);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'MadeTommy', sans-serif;
      background: var(--black); color: var(--white);
      overflow-x: hidden; cursor: none;
    }

    /* ── CURSOR ── */
    .cursor {
      position: fixed; top: 0; left: 0; width: 34px; height: 20px;
      pointer-events: none; z-index: 99999; transform: translate(-50%,-50%);
      filter: drop-shadow(0 0 5px rgba(204,16,32,0.8));
    }
    .cursor-ring {
      position: fixed; top: 0; left: 0; width: 50px; height: 50px;
      border: 1px solid rgba(204,16,32,0.3); border-radius: 50%;
      pointer-events: none; z-index: 99998; transform: translate(-50%,-50%);
      transition: width .3s cubic-bezier(.34,1.56,.64,1), height .3s cubic-bezier(.34,1.56,.64,1);
    }
    .cursor.hovered { filter: drop-shadow(0 0 12px rgba(204,16,32,1)); }
    .cursor-ring.hovered { width: 70px; height: 70px; border-color: rgba(204,16,32,.5); }

    /* ── BG ── */
    .bg-fixed {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('img_00.jpg');
      background-size: cover; background-position: center; opacity: 0.25;
    }
    .bg-overlay { position: fixed; inset: 0; z-index: 1; background: rgba(13,0,5,0.9); }

    /* ── LOGIN ── */
    #login-screen {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: rgba(13,0,5,0.97);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 48px;
      width: 100%; max-width: 400px;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(204,16,32,0.08);
    }
    .login-logo {
      height: 36px; margin-bottom: 36px;
      filter: drop-shadow(0 0 12px rgba(204,16,32,0.5));
    }
    .login-box h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem; letter-spacing: 5px;
      color: var(--white); margin-bottom: 6px;
    }
    .login-box p {
      font-family: 'BabyDoll', sans-serif;
      font-size: 0.95rem; color: rgba(250,245,239,0.35);
      margin-bottom: 36px; letter-spacing: 1px;
    }
    .form-group { margin-bottom: 18px; text-align: left; }
    .form-group label {
      display: block; font-weight: 500; font-size: 0.65rem;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--red); margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; padding: 12px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 50px;
      color: var(--white); font-family: 'MadeTommy', sans-serif;
      font-size: 0.9rem; outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      cursor: none;
    }
    .form-group input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(204,16,32,0.12);
    }
    .login-btn {
      width: 100%; padding: 14px;
      background: var(--red); color: var(--white);
      border: none; border-radius: 50px;
      font-family: 'MadeTommy', sans-serif; font-weight: 700;
      font-size: 0.78rem; letter-spacing: 4px; text-transform: uppercase;
      cursor: none; margin-top: 8px;
      transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
    }
    .login-btn:hover {
      background: #a50e1a; transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(204,16,32,0.4);
    }
    .login-error {
      color: #ff5566; font-size: 0.78rem; letter-spacing: 1px;
      margin-top: 14px; display: none;
      font-family: 'BabyDoll', sans-serif;
    }

    /* ── ADMIN PANEL ── */
    #admin-panel { display: none; position: relative; z-index: 10; min-height: 100vh; }

    .admin-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,0,5,0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .admin-header-left { display: flex; align-items: center; gap: 16px; }
    .admin-header img { height: 26px; filter: drop-shadow(0 0 8px rgba(204,16,32,0.4)); }
    .admin-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 5px; color: var(--red);
    }
    .admin-header-right { display: flex; align-items: center; gap: 12px; }

    .save-all-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 24px; border-radius: 50px;
      background: var(--red); color: var(--white);
      border: none; font-family: 'MadeTommy', sans-serif; font-weight: 700;
      font-size: 0.72rem; letter-spacing: 3px; text-transform: uppercase;
      cursor: none; transition: all 0.3s;
    }
    .save-all-btn:hover { background: #a50e1a; box-shadow: 0 4px 20px rgba(204,16,32,0.4); transform: translateY(-1px); }
    .save-all-btn.saving { background: #555; }
    .save-all-btn.saved { background: #1a7a40; }

    .logout-btn {
      padding: 9px 20px; border-radius: 50px;
      background: transparent; color: rgba(250,245,239,0.4);
      border: 1px solid rgba(250,245,239,0.12);
      font-family: 'MadeTommy', sans-serif; font-weight: 400;
      font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
      cursor: none; transition: all 0.3s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* TABS */
    .admin-tabs {
      display: flex; gap: 6px; padding: 20px 32px 0;
      border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .admin-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 9px 22px; border-radius: 50px 50px 0 0;
      background: transparent; color: rgba(250,245,239,0.4);
      border: 1px solid transparent; border-bottom: none;
      font-family: 'MadeTommy', sans-serif; font-weight: 500;
      font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase;
      cursor: none; transition: all 0.3s; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active {
      background: rgba(204,16,32,0.1);
      border-color: var(--border);
      color: var(--white);
    }

    /* TAB CONTENT */
    .tab-content { display: none; padding: 32px; max-width: 1000px; }
    .tab-content.active { display: block; }

    /* STATUS BAR */
    #status-bar {
      display: none; position: fixed; top: 62px; left: 0; right: 0;
      height: 3px; background: var(--red);
      animation: statusSlide 0.4s ease;
      z-index: 90; border-radius: 0 0 3px 3px;
    }
    @keyframes statusSlide { from { width: 0 } to { width: 100% } }

    /* EDIT CARDS */
    .edit-card {
      background: var(--surface);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 28px; margin-bottom: 20px;
      backdrop-filter: blur(12px);
      transition: border-color 0.3s;
    }
    .edit-card:hover { border-color: rgba(204,16,32,0.35); }
    .edit-card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 3px;
      color: var(--red); margin-bottom: 22px;
      display: flex; align-items: center; gap: 10px;
    }
    .edit-card-title::before {
      content: ''; display: block;
      width: 3px; height: 18px; background: var(--red); border-radius: 3px;
    }

    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .edit-field { margin-bottom: 16px; }
    .edit-field label {
      display: block; font-weight: 500;
      font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(250,245,239,0.4); margin-bottom: 8px;
    }
    .edit-field input,
    .edit-field textarea,
    .edit-field select {
      width: 100%; padding: 11px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--white); font-family: 'MadeTommy', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.3s, box-shadow 0.3s;
      cursor: none;
    }
    .edit-field textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
    .edit-field input:focus,
    .edit-field textarea:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(204,16,32,0.1);
    }

    /* IMAGE UPLOAD */
    .image-upload-area {
      border: 2px dashed rgba(204,16,32,0.25); border-radius: 16px;
      padding: 32px 20px; text-align: center;
      transition: all 0.3s; position: relative; cursor: none;
    }
    .image-upload-area:hover { border-color: var(--red); background: rgba(204,16,32,0.04); }
    .image-upload-area input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }
    .upload-icon { font-size: 2rem; margin-bottom: 10px; }
    .upload-text {
      font-weight: 500; font-size: 0.82rem; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(250,245,239,0.5);
      margin-bottom: 6px;
    }
    .upload-hint {
      font-family: 'BabyDoll', sans-serif;
      font-size: 0.85rem; color: rgba(250,245,239,0.3);
    }

    .upload-progress {
      display: none; height: 3px; border-radius: 3px;
      background: rgba(204,16,32,0.15); margin-top: 12px; overflow: hidden;
    }
    .upload-progress-bar {
      height: 100%; width: 0%;
      background: var(--red); border-radius: 3px;
      transition: width 0.4s ease;
    }
    .upload-status {
      display: none; font-family: 'BabyDoll', sans-serif;
      font-size: 0.85rem; margin-top: 8px;
      color: rgba(250,245,239,0.5);
    }

    .current-image-preview {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 18px; border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border); margin-bottom: 12px;
    }
    .current-image-preview img {
      height: 52px; width: 80px; object-fit: cover;
      border-radius: 8px;
    }
    .img-info { font-family: 'BabyDoll', sans-serif; font-size: 0.85rem; color: rgba(250,245,239,0.4); }

    /* KONTAKT ENTRIES */
    .kontakt-entry {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border); border-radius: 16px;
      padding: 20px 24px; margin-bottom: 14px;
      transition: border-color 0.3s;
    }
    .kontakt-entry:hover { border-color: rgba(204,16,32,0.3); }
    .kontakt-entry-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
    }
    .kontakt-name { font-weight: 700; font-size: 0.95rem; }
    .kontakt-email { font-size: 0.82rem; color: var(--red); margin-top: 2px; }
    .kontakt-badge {
      font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 12px; border-radius: 50px;
      background: rgba(204,16,32,0.1); border: 1px solid rgba(204,16,32,0.25);
      color: rgba(250,245,239,0.5);
    }
    .kontakt-message {
      font-family: 'BabyDoll', sans-serif;
      font-size: 0.95rem; line-height: 1.7;
      color: rgba(250,245,239,0.55);
    }
    .kontakt-date {
      font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(250,245,239,0.25); margin-top: 12px;
    }
    .empty-state {
      text-align: center; padding: 60px 20px;
      font-family: 'BabyDoll', sans-serif;
      color: rgba(250,245,239,0.25); font-size: 1rem; letter-spacing: 1px;
    }
    .empty-state svg { display: block; margin: 0 auto 16px; opacity: 0.2; }

    @media (max-width: 700px) {
      .edit-grid { grid-template-columns: 1fr; }
      .tab-content { padding: 20px 16px; }
      .admin-header { padding: 12px 16px; }
      .admin-tabs { padding: 16px 16px 0; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor">
  <svg viewBox="0 0 198.77 104.44" xmlns="http://www.w3.org/2000/svg">
    <path fill="#CC1020" d="M67.22,78.24,18.38,103.57c-7.07,3.09-14.77-2.29-15.91-11.15A319.7,319.7,0,0,1,0,52.23,319.9,319.9,0,0,1,2.48,12C3.61,3.16,11.29-2.2,18.34.88L67.22,26.22C71.92,28.27,75,33.59,75,39.54V64.92C75,70.87,71.92,76.19,67.22,78.24Z"/>
    <path fill="#CC1020" d="M131.55,78.24l48.83,25.33c7.08,3.09,14.78-2.29,15.91-11.15a319.4,319.4,0,0,0,2.48-40.19A317.7,317.7,0,0,0,196.28,12C195.15,3.16,187.48-2.2,180.43.88L131.55,26.22c-4.7,2.05-7.82,7.37-7.82,13.32V64.92C123.73,70.87,126.85,76.19,131.55,78.24Z"/>
    <path fill="#e03040" d="M88.88,29a7.17,7.17,0,0,0-7.17,7.17V68.3a7.17,7.17,0,0,0,7.17,7.16h0a7.17,7.17,0,0,0,7.17-7.16V36.15A7.17,7.17,0,0,0,88.88,29Z"/>
    <path fill="#e03040" d="M109.89,29a7.17,7.17,0,0,0-7.17,7.17V68.3a7.17,7.17,0,0,0,7.17,7.16h0a7.17,7.17,0,0,0,7.16-7.16V36.15A7.17,7.17,0,0,0,109.89,29Z"/>
  </svg>
</div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="bg-fixed"></div>
<div class="bg-overlay"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img src="img_03.png" class="login-logo" alt="FlyOriginals">
    <h2>Admin Login</h2>
    <p>Nur für autorisierte Personen</p>
    <div class="form-group">
      <label>Benutzername</label>
      <input type="text" id="login-user" placeholder="Admin" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Passwort</label>
      <input type="password" id="login-pass" placeholder="••••••••">
    </div>
    <button class="login-btn" onclick="doLogin()">Anmelden</button>
    <div class="login-error" id="login-error">Falsche Zugangsdaten</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div id="status-bar"></div>

  <div class="admin-header">
    <div class="admin-header-left">
      <img src="img_03.png" alt="FlyOriginals">
      <span class="admin-title">Admin Panel</span>
    </div>
    <div class="admin-header-right">
      <button class="save-all-btn" id="save-btn" onclick="saveAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Speichern
      </button>
      <button class="logout-btn" onclick="doLogout()">Abmelden</button>
    </div>
  </div>

  <div class="admin-tabs">
    <button class="tab-btn active" onclick="switchTab('hero', this)">Hero</button>
    <button class="tab-btn" onclick="switchTab('projects', this)">Flyer</button>
    <button class="tab-btn" onclick="switchTab('partners', this)">Partner</button>
    <button class="tab-btn" onclick="switchTab('about', this)">Über uns</button>
    <button class="tab-btn" onclick="switchTab('images', this)">Bilder</button>
    <button class="tab-btn" onclick="switchTab('kontakt', this)">Nachrichten</button>
  </div>

  <!-- HERO -->
  <div class="tab-content active" id="tab-hero">
    <div class="edit-card">
      <div class="edit-card-title">Hero Bereich</div>
      <div class="edit-field"><label>Eyebrow Text</label><input type="text" id="hero_eyebrow" placeholder="✦ Handwerk trifft Design ✦"></div>
      <div class="edit-field"><label>Untertitel</label><input type="text" id="hero_subtitle" placeholder="Meisterhafte Krawatten-Designs"></div>
      <div class="edit-field"><label>Tagline</label><textarea id="hero_tagline" placeholder="Wir erschaffen ikonische Fliegen-Krawatten..."></textarea></div>
      <div class="edit-grid">
        <div class="edit-field"><label>Button 1</label><input type="text" id="hero_btn1" placeholder="Unsere Projekte"></div>
        <div class="edit-field"><label>Button 2</label><input type="text" id="hero_btn2" placeholder="Entdecke Partner"></div>
      </div>
    </div>
  </div>

  <!-- PROJEKTE -->
  <div class="tab-content" id="tab-projects">
    <div class="edit-card">
      <div class="edit-card-title">Flyer Überschrift</div>
      <div class="edit-field"><label>Abschnittstitel</label><input type="text" id="projects_title" placeholder="Unsere Flyer"></div>
    </div>
    <div id="projects-list"></div>
  </div>

  <!-- PARTNER -->
  <div class="tab-content" id="tab-partners">
    <div class="edit-card">
      <div class="edit-card-title">Partner Überschrift</div>
      <div class="edit-field"><label>Abschnittstitel</label><input type="text" id="partners_title" placeholder="Unsere Partner"></div>
    </div>
    <div id="partners-list"></div>
  </div>

  <!-- ÜBER UNS -->
  <div class="tab-content" id="tab-about">
    <div class="edit-card">
      <div class="edit-card-title">Über uns</div>
      <div class="edit-grid">
        <div class="edit-field"><label>Titel Zeile 1</label><input type="text" id="about_title1" placeholder="Born Fly"></div>
        <div class="edit-field"><label>Titel Zeile 2</label><input type="text" id="about_title2" placeholder="Stay Original"></div>
      </div>
      <div class="edit-field"><label>Absatz 1</label><textarea id="about_p1"></textarea></div>
      <div class="edit-field"><label>Absatz 2</label><textarea id="about_p2"></textarea></div>
    </div>
    <div class="edit-card">
      <div class="edit-card-title">Statistiken</div>
      <div class="edit-grid">
        <div class="edit-field"><label>Stat 1 Zahl</label><input type="text" id="stat1_num" placeholder="12"></div>
        <div class="edit-field"><label>Stat 1 Label</label><input type="text" id="stat1_label" placeholder="Jahre Erfahrung"></div>
        <div class="edit-field"><label>Stat 2 Zahl</label><input type="text" id="stat2_num" placeholder="50"></div>
        <div class="edit-field"><label>Stat 2 Label</label><input type="text" id="stat2_label" placeholder="Kollektionen"></div>
        <div class="edit-field"><label>Stat 3 Zahl</label><input type="text" id="stat3_num" placeholder="100"></div>
        <div class="edit-field"><label>Stat 3 Label</label><input type="text" id="stat3_label" placeholder="Handwerk"></div>
        <div class="edit-field"><label>Stat 4 Zahl</label><input type="text" id="stat4_num" placeholder="20"></div>
        <div class="edit-field"><label>Stat 4 Label</label><input type="text" id="stat4_label" placeholder="Länder"></div>
      </div>
    </div>
  </div>

  <!-- BILDER -->
  <div class="tab-content" id="tab-images">
    <div class="edit-card">
      <div class="edit-card-title">Logo</div>
      <div class="current-image-preview">
        <img id="current-logo" src="img_03.png" alt="Logo">
        <div class="img-info">Aktuelles Logo</div>
      </div>
      <div class="image-upload-area">
        <input type="file" accept="image/*" onchange="uploadImage('logo', this)">
        <div class="upload-icon">🎀</div>
        <div class="upload-text">Neues Logo hochladen</div>
        <div class="upload-hint">PNG mit Transparenz empfohlen</div>
      </div>
      <div class="upload-progress" id="progress-logo"><div class="upload-progress-bar" id="bar-logo"></div></div>
      <div class="upload-status" id="status-logo"></div>
    </div>
    <div id="project-images-list"></div>
  </div>

  <!-- KONTAKT NACHRICHTEN -->
  <div class="tab-content" id="tab-kontakt">
    <div class="edit-card">
      <div class="edit-card-title">Eingegangene Nachrichten</div>
      <div id="kontakt-list">
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Nachrichten werden geladen…
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabase = createClient(
    'https://ikecjftuznkjvrtefeiv.supabase.co',
    'sb_publishable_Jspdoxs6GEv0_kMEeT-WFQ_TFsJVR7W'
  )

  const DEFAULTS = {
    hero_eyebrow: '✦ Handwerk trifft Design ✦',
    hero_subtitle: 'Meisterhafte Krawatten-Designs',
    hero_tagline: 'Wir erschaffen ikonische Fliegen-Krawatten,\ndie Geschichten erzählen und Charaktere definieren.',
    hero_btn1: 'Unsere Projekte', hero_btn2: 'Entdecke Partner',
    projects_title: 'Unsere Projekte',
    flyer1_title:'', flyer2_title:'', flyer3_title:'',
    partners_title: 'Unsere Partner',
    partner1_name:'Luxury Brands',   partner1_desc:'Exklusive Kollaborationen mit führenden Designlabels',
    partner2_name:'Fashion Houses',  partner2_desc:'Partnerschaft mit internationalen Mode-Größen',
    partner3_name:'Design Studios',  partner3_desc:'Kreative Zusammenarbeit mit talentierten Künstlern',
    partner4_name:'Global Retailers',partner4_desc:'Distribution in über 20 Ländern weltweit',
    about_title1:'Born Fly', about_title2:'Stay Original',
    about_p1:'FlyOriginals ist mehr als ein Accessoire-Label – es ist eine Philosophie. Mit jeder handgefertigten Krawatte erzählen wir Geschichten von Leidenschaft, Handwerk und unbegrenzter Kreativität.',
    about_p2:'Seit über einem Jahrzehnt arbeiten wir mit den besten Materialien und den talentiertesten Designern zusammen, um Fliegen-Krawatten zu schaffen, die wirklich einzigartig sind.',
    stat1_num:'12', stat1_label:'Jahre Erfahrung',
    stat2_num:'50', stat2_label:'Kollektionen',
    stat3_num:'100',stat3_label:'Handwerk',
    stat4_num:'20', stat4_label:'Länder',
  }

  // ── CURSOR ──
  const cursor = document.getElementById('cursor')
  const ring = document.getElementById('cursorRing')
  let mx=0,my=0,rx=0,ry=0
  document.addEventListener('mousemove', e => {
    mx=e.clientX; my=e.clientY
    cursor.style.left=mx+'px'; cursor.style.top=my+'px'
  })
  ;(function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop)})()
  const hoverEls = () => document.querySelectorAll('a,button,input,textarea,.image-upload-area')
  document.addEventListener('click', () => hoverEls().forEach(el => {
    el.addEventListener('mouseenter',()=>{cursor.classList.add('hovered');ring.classList.add('hovered')})
    el.addEventListener('mouseleave',()=>{cursor.classList.remove('hovered');ring.classList.remove('hovered')})
  }))
  setTimeout(() => hoverEls().forEach(el => {
    el.addEventListener('mouseenter',()=>{cursor.classList.add('hovered');ring.classList.add('hovered')})
    el.addEventListener('mouseleave',()=>{cursor.classList.remove('hovered');ring.classList.remove('hovered')})
  }), 500)

  // ── LOGIN ──
  window.doLogin = function() {
    const user = document.getElementById('login-user').value.trim()
    const pass = document.getElementById('login-pass').value.trim()
    const err = document.getElementById('login-error')
    if (user === 'Admin' && pass === 'HerrFliege') {
      document.getElementById('login-screen').style.display = 'none'
      document.getElementById('admin-panel').style.display = 'block'
      loadContent()
    } else {
      err.style.display = 'block'
      setTimeout(() => err.style.display = 'none', 3000)
    }
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') window.doLogin()
  })
  window.doLogout = function() {
    document.getElementById('admin-panel').style.display = 'none'
    document.getElementById('login-screen').style.display = 'flex'
    document.getElementById('login-user').value = ''
    document.getElementById('login-pass').value = ''
  }

  // ── TABS ──
  window.switchTab = function(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'))
    btn.classList.add('active')
    document.getElementById('tab-' + name).classList.add('active')
    if (name === 'kontakt') loadKontakt()
  }

  // ── LOAD ──
  async function loadContent() {
    const { data } = await supabase.from('site_content').select('key, value')
    const content = {}
    if (data) data.forEach(row => content[row.key] = row.value)
    Object.keys(DEFAULTS).forEach(key => {
      const el = document.getElementById(key)
      if (el) el.value = content[key] ?? DEFAULTS[key]
    })
    buildProjectCards(content) // flyer cards
    buildPartnerCards(content)
    buildImageUploads(content)
    if (content['img_logo']) document.getElementById('current-logo').src = content['img_logo']
  }

  function buildProjectCards(content = {}) {
    const list = document.getElementById('projects-list')
    list.innerHTML = ''
    for (let i = 1; i <= 3; i++) {
      const url = content[`img_flyer${i}`] || ''
      list.innerHTML += `
        <div class="edit-card">
          <div class="edit-card-title">Flyer ${i}</div>
          <div class="edit-field"><label>Titel (wird unten auf dem Flyer angezeigt)</label>
            <input type="text" id="flyer${i}_title" value="${content[`flyer${i}_title`] ?? ''}">
          </div>
          <div class="edit-field"><label>Link (URL beim Klick auf den Flyer)</label>
            <input type="text" id="flyer${i}_href" placeholder="https://..." value="${content[`flyer${i}_href`] ?? ''}">
          </div>
          ${url ? `<div class="current-image-preview"><img src="${url}" alt="Flyer ${i}" style="height:80px;width:60px;object-fit:cover"><div class="img-info">Aktuelles Bild</div></div>` : ''}
          <div class="image-upload-area">
            <input type="file" accept="image/*" onchange="uploadImage('flyer${i}', this)">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">Flyer ${i} hochladen</div>
            <div class="upload-hint">JPG, PNG · Hochformat empfohlen (3:4)</div>
          </div>
          <div class="upload-progress" id="progress-flyer${i}"><div class="upload-progress-bar" id="bar-flyer${i}"></div></div>
          <div class="upload-status" id="status-flyer${i}"></div>
        </div>`
    }
  }

  function buildPartnerCards(content = {}) {
    const list = document.getElementById('partners-list')
    list.innerHTML = ''
    for (let i = 1; i <= 4; i++) {
      list.innerHTML += `
        <div class="edit-card">
          <div class="edit-card-title">Partner ${i}</div>
          <div class="edit-field"><label>Name</label><input type="text" id="partner${i}_name" value="${content[`partner${i}_name`] ?? DEFAULTS[`partner${i}_name`]}"></div>
          <div class="edit-field"><label>Beschreibung</label><input type="text" id="partner${i}_desc" value="${content[`partner${i}_desc`] ?? DEFAULTS[`partner${i}_desc`]}"></div>
        </div>`
    }
  }

  function buildImageUploads(content = {}) {
    // Flyer images are handled directly in buildProjectCards
    const list = document.getElementById('project-images-list')
    if (list) list.innerHTML = ''
  }

  // ── KONTAKT NACHRICHTEN ──
  async function loadKontakt() {
    const list = document.getElementById('kontakt-list')
    list.innerHTML = '<div class="empty-state">Nachrichten werden geladen…</div>'
    const { data, error } = await supabase
      .from('kontakt').select('*').order('created_at', { ascending: false })
    if (error || !data || data.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        Noch keine Nachrichten eingegangen.
      </div>`
      return
    }
    list.innerHTML = data.map(m => `
      <div class="kontakt-entry">
        <div class="kontakt-entry-header">
          <div>
            <div class="kontakt-name">${m.vorname} ${m.nachname || ''}</div>
            <div class="kontakt-email">${m.email}</div>
          </div>
          ${m.betreff ? `<span class="kontakt-badge">${m.betreff}</span>` : ''}
        </div>
        <div class="kontakt-message">${m.nachricht}</div>
        <div class="kontakt-date">${new Date(m.created_at).toLocaleString('de-DE')}</div>
      </div>`).join('')
  }

  // ── SAVE ──
  window.saveAll = async function() {
    const btn = document.getElementById('save-btn')
    btn.textContent = '⏳ Speichert...'
    btn.classList.add('saving')
    // Add flyer titles to save
    const flyerExtras = [1,2,3].flatMap(i => [
      { key: `flyer${i}_title`, value: document.getElementById(`flyer${i}_title`)?.value || '' },
      { key: `flyer${i}_href`,  value: document.getElementById(`flyer${i}_href`)?.value  || '' }
    ])
    const upserts = [...Object.keys(DEFAULTS).map(key => {
      const el = document.getElementById(key)
      return el ? { key, value: el.value } : null
    }).filter(Boolean), ...flyerExtras]
    const { error } = await supabase.from('site_content').upsert(upserts, { onConflict: 'key' })
    if (error) {
      btn.innerHTML = '❌ Fehler!'
      btn.style.background = '#aa0000'
      setTimeout(() => { btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Speichern'; btn.style.background=''; btn.classList.remove('saving') }, 3000)
    } else {
      btn.textContent = '✓ Gespeichert!'
      btn.classList.remove('saving'); btn.classList.add('saved')
      const bar = document.getElementById('status-bar')
      bar.style.display = 'block'
      setTimeout(() => { btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Speichern'; btn.classList.remove('saved'); bar.style.display='none' }, 3000)
    }
  }

  // ── IMAGE UPLOAD ──
  window.uploadImage = async function(key, input) {
    const file = input.files[0]; if (!file) return
    const progress = document.getElementById(`progress-${key}`)
    const bar = document.getElementById(`bar-${key}`)
    const status = document.getElementById(`status-${key}`)
    progress.style.display='block'; status.style.display='block'
    status.textContent='Wird hochgeladen...'; bar.style.width='30%'
    const ext = file.name.split('.').pop()
    const filename = `${key}_${Date.now()}.${ext}`
    bar.style.width='60%'
    const { error } = await supabase.storage.from('site-images').upload(filename, file, { upsert: true })
    if (error) { status.textContent='❌ Upload fehlgeschlagen: '+error.message; bar.style.width='0%'; return }
    bar.style.width='100%'
    const { data: urlData } = supabase.storage.from('site-images').getPublicUrl(filename)
    await supabase.from('site_content').upsert([{ key: `img_${key}`, value: urlData.publicUrl }], { onConflict: 'key' })
    status.textContent='✓ Erfolgreich hochgeladen!'
    status.style.color='#4caf50'
    if (key === 'logo') document.getElementById('current-logo').src = urlData.publicUrl
    setTimeout(() => { progress.style.display='none'; status.style.display='none'; status.style.color='' }, 3000)
  }
</script>
</body>
</html>
