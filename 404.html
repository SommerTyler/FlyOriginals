<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Seite nicht gefunden | FlyOriginals</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="preload" href="img_00.jpg" as="image">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Oswald:wght@200;400&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: 'MadeTommy'; src: url('fonts/made-tommy-light.otf') format('opentype'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'MadeTommy'; src: url('fonts/made-tommy-regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'MadeTommy'; src: url('fonts/made-tommy-medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'MadeTommy'; src: url('fonts/made-tommy-bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
    @font-face { font-family: 'BabyDoll'; src: url('fonts/baby-doll.otf') format('opentype'); font-weight: 400; font-display: swap; }
    :root {
      --black: #0d0005; --maroon: #3B0010; --red: #CC1020; --white: #FAF5EF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--white); background: var(--black);
      cursor: none; display: flex; flex-direction: column;
    }

    /* Cursor */
    .cursor {
      position: fixed; top: 0; left: 0; width: 36px; height: 20px;
      pointer-events: none; z-index: 99995; transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 6px rgba(204,16,32,0.8));
      animation: bow-breathe 2.8s ease-in-out infinite;
    }
    .cursor-ring {
      position: fixed; top: 0; left: 0; width: 56px; height: 56px;
      border: 1px solid rgba(204,16,32,0.25); border-radius: 50%;
      pointer-events: none; z-index: 9997; transform: translate(-50%, -50%);
      transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1), height 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cursor.hovered { filter: drop-shadow(0 0 14px rgba(204,16,32,1)) drop-shadow(0 0 28px rgba(204,16,32,0.5)); animation: none; }
    .cursor-ring.hovered { width: 76px; height: 76px; border-color: rgba(204,16,32,0.5); }
    @keyframes bow-breathe {
      0%,100% { filter: drop-shadow(0 0 6px rgba(204,16,32,0.8)) drop-shadow(0 0 14px rgba(204,16,32,0.35)); }
      50% { filter: drop-shadow(0 0 12px rgba(204,16,32,1)) drop-shadow(0 0 26px rgba(204,16,32,0.6)); }
    }

    /* BG */
    .bg-fixed {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('img_00.jpg');
      background-size: cover; background-position: center;
    }
    .bg-vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center, rgba(13,0,5,0.5) 0%, rgba(13,0,5,0.93) 100%);
    }

    /* Main */
    main {
      position: relative; z-index: 10;
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 8vh 8%;
      gap: 0;
    }

    .err-eyebrow {
      font-family: 'Oswald', sans-serif; font-weight: 200;
      font-size: 0.72rem; letter-spacing: 8px; text-transform: uppercase;
      color: var(--red); margin-bottom: 28px;
      animation: fadeInUp 0.8s ease 0.2s both;
    }

    .err-bow {
      width: clamp(80px, 14vw, 160px);
      filter: drop-shadow(0 0 24px rgba(204,16,32,0.6));
      margin-bottom: 32px;
      animation: errBow 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    @keyframes errBow {
      from { opacity: 0; transform: scale(0.5) rotate(-30deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .err-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(7rem, 18vw, 18rem);
      line-height: 0.85; letter-spacing: 8px;
      color: transparent;
      -webkit-text-stroke: 2px rgba(204,16,32,0.5);
      background: linear-gradient(to bottom, rgba(204,16,32,0.7), rgba(59,0,16,0.3));
      -webkit-background-clip: text; background-clip: text;
      animation: fadeInUp 0.8s ease 0.3s both;
      margin-bottom: 8px;
    }

    .err-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 4vw, 4rem);
      letter-spacing: 6px; color: var(--white);
      animation: fadeInUp 0.8s ease 0.45s both;
      margin-bottom: 20px;
    }

    .err-desc {
      font-style: italic; font-weight: 300;
      font-size: clamp(1rem, 1.8vw, 1.4rem);
      color: rgba(250,245,239,0.5); line-height: 1.7;
      max-width: 460px; margin-bottom: 48px;
      animation: fadeInUp 0.8s ease 0.6s both;
    }

    .err-divider {
      width: 48px; height: 2px; background: var(--red);
      margin: 0 auto 40px;
      animation: fadeInUp 0.8s ease 0.55s both;
    }

    .err-actions {
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
      animation: fadeInUp 0.8s ease 0.75s both;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 32px;
      font-family: 'Oswald', sans-serif; font-weight: 400;
      font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase;
      text-decoration: none; border: none; cursor: none;
      position: relative; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
      transform: translateX(-100%); transition: transform 0.5s ease;
    }
    .btn:hover::before { transform: translateX(100%); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(204,16,32,0.5); }
    .btn-red { background: var(--red); color: var(--white); }
    .btn-outline { background: transparent; border: 1px solid rgba(250,245,239,0.25); color: var(--white); }
    .btn-outline:hover { border-color: var(--red); }

    /* Footer strip */
    .err-footer {
      position: relative; z-index: 10;
      padding: 16px 8%; text-align: center;
      font-family: 'Oswald', sans-serif; font-weight: 200;
      font-size: 0.65rem; letter-spacing: 3px;
      color: rgba(250,245,239,0.2);
      border-top: 1px solid rgba(122,0,32,0.15);
    }

    /* Floating bows BG decoration */
    .deco-bow {
      position: fixed; pointer-events: none; z-index: 2;
      opacity: 0; animation: floatDeco var(--dur) var(--del) ease-in-out infinite;
    }
    @keyframes floatDeco {
      0%   { opacity: 0; transform: translateY(20px) rotate(var(--rot)); }
      20%  { opacity: var(--op); }
      80%  { opacity: var(--op); }
      100% { opacity: 0; transform: translateY(-60px) rotate(calc(var(--rot) + 20deg)); }
    }

    @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 600px) {
  
  
    }

    #scrollProgress { position:fixed;top:0;left:0;z-index:9997;height:3px;width:0%;background:linear-gradient(to right,#3B0010,#CC1020);border-radius:0 3px 3px 0;box-shadow:0 0 8px rgba(204,16,32,.6);transition:width .1s linear; }
    #pageTransition {
      position:fixed;inset:0;z-index:99990;background:#0d0005;
      pointer-events:none;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:32px;
      opacity:0;transition:opacity .3s ease;
    }
    #pageTransition.active { opacity:1; pointer-events:all; }
    #pt-logo { width:clamp(100px,20vw,180px); }
    #pageTransition.active #pt-logo { animation:pt-glow .9s ease-in-out infinite alternate; }
    @keyframes pt-glow {
      from { filter:drop-shadow(0 0 10px rgba(204,16,32,.5)); transform:scale(.97); }
      to   { filter:drop-shadow(0 0 38px rgba(204,16,32,1)) drop-shadow(0 0 70px rgba(204,16,32,.3)); transform:scale(1.04); }
    }
    #pt-track { width:clamp(140px,24vw,260px);height:3px;background:rgba(204,16,32,.12);border-radius:3px;overflow:hidden;position:relative; }
    #pt-fill { position:absolute;top:0;left:0;bottom:0;width:0%;background:linear-gradient(to right,#3B0010,#CC1020,#ff5040);border-radius:3px;box-shadow:0 0 8px rgba(204,16,32,.7);transition:width .06s linear; }
    #pt-label { font-family:'MadeTommy',sans-serif;font-weight:300;font-size:.6rem;letter-spacing:7px;text-transform:uppercase;color:rgba(250,245,239,.22);margin-top:-14px; }
    .trail-particle { position:fixed;pointer-events:none;z-index:9996;border-radius:50%;background:#CC1020;transform:translate(-50%,-50%);animation:trailFade .6s ease forwards; }
    @keyframes trailFade { 0%{opacity:.6;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.1)} }
100%{opacity:0;transform:translate(-50%,-50%) scale(.1)} }

  </style>
</head>
<body>

<div id="scrollProgress"></div>
<div id="pageTransition">
  <svg id="pt-logo" viewBox="0 0 198.77 104.44" xmlns="http://www.w3.org/2000/svg">
    <path fill="#CC1020" d="M67.22,78.24,18.38,103.57c-7.07,3.09-14.77-2.29-15.91-11.15A319.7,319.7,0,0,1,0,52.23,319.9,319.9,0,0,1,2.48,12C3.61,3.16,11.29-2.2,18.34.88L67.22,26.22C71.92,28.27,75,33.59,75,39.54V64.92C75,70.87,71.92,76.19,67.22,78.24Z"/>
    <path fill="#CC1020" d="M131.55,78.24l48.83,25.33c7.08,3.09,14.78-2.29,15.91-11.15a319.4,319.4,0,0,0,2.48-40.19A317.7,317.7,0,0,0,196.28,12C195.15,3.16,187.48-2.2,180.43.88L131.55,26.22c-4.7,2.05-7.82,7.37-7.82,13.32V64.92C123.73,70.87,126.85,76.19,131.55,78.24Z"/>
    <path fill="#e03040" d="M88.88,29a7.17,7.17,0,0,0-7.17,7.17V68.3a7.17,7.17,0,0,0,7.17,7.16h0a7.17,7.17,0,0,0,7.17-7.16V36.15A7.17,7.17,0,0,0,88.88,29Z"/>
    <path fill="#e03040" d="M109.89,29a7.17,7.17,0,0,0-7.17,7.17V68.3a7.17,7.17,0,0,0,7.17,7.16h0a7.17,7.17,0,0,0,7.16-7.16V36.15A7.17,7.17,0,0,0,109.89,29Z"/>
  </svg>
  <div id="pt-track"><div id="pt-fill"></div></div>
  <div id="pt-label">Born Fly. Stay Original.</div>
</div>
<div class="cursor" id="cursor">
  <svg viewBox="0 0 198.77 104.44" xmlns="http://www.w3.org/2000/svg">
    <path fill="#CC1020" d="M67.22,78.24,18.38,103.57c-7.07,3.09-14.77-2.29-15.91-11.15A319.7,319.7,0,0,1,0,52.23,319.9,319.9,0,0,1,2.48,12C3.61,3.16,11.29-2.2,18.34.88L67.22,26.22C71.92,28.27,75,33.59,75,39.54V64.92C75,70.87,71.92,76.19,67.22,78.24Z"/>
    <path fill="#CC1020" d="M131.55,78.24l48.83,25.33c7.08,3.09,14.78-2.29,15.91-11.15a319.4,319.4,0,0,0,2.48-40.19A317.7,317.7,0,0,0,196.28,12C195.15,3.16,187.48-2.2,180.43.88L131.55,26.22c-4.7,2.05-7.82,7.37-7.82,13.32V64.92C123.73,70.87,126.85,76.19,131.55,78.24Z"/>
    <path fill="#e03040" d="M88.88,29a7.17,7.17,0,0,0-7.17,7.17V68.3a7.17,7.17,0,0,0,7.17,7.16h0a7.17,7.17,0,0,0,7.17-7.16V36.15A7.17,7.17,0,0,0,88.88,29Z"/>
    <path fill="#e03040" d="M109.89,29a7.17,7.17,0,0,0-7.17,7.17V68.3a7.17,7.17,0,0,0,7.17,7.16h0a7.17,7.17,0,0,0,7.16-7.16V36.15A7.17,7.17,0,0,0,109.89,29Z"/>
  </svg>
</div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="bg-fixed"></div>
<div class="bg-vignette"></div>

<main>
  <p class="err-eyebrow">✦ Seite nicht gefunden ✦</p>

  <svg class="err-bow" viewBox="0 0 198.77 104.44" xmlns="http://www.w3.org/2000/svg">
    <path fill="#CC1020" d="M67.22,78.24,18.38,103.57c-7.07,3.09-14.77-2.29-15.91-11.15A319.7,319.7,0,0,1,0,52.23,319.9,319.9,0,0,1,2.48,12C3.61,3.16,11.29-2.2,18.34.88L67.22,26.22C71.92,28.27,75,33.59,75,39.54V64.92C75,70.87,71.92,76.19,67.22,78.24Z"/>
    <path fill="#CC1020" d="M131.55,78.24l48.83,25.33c7.08,3.09,14.78-2.29,15.91-11.15a319.4,319.4,0,0,0,2.48-40.19A317.7,317.7,0,0,0,196.28,12C195.15,3.16,187.48-2.2,180.43.88L131.55,26.22c-4.7,2.05-7.82,7.37-7.82,13.32V64.92C123.73,70.87,126.85,76.19,131.55,78.24Z"/>
    <path fill="#e03040" d="M88.88,29a7.17,7.17,0,0,0-7.17,7.17V68.3a7.17,7.17,0,0,0,7.17,7.16h0a7.17,7.17,0,0,0,7.17-7.16V36.15A7.17,7.17,0,0,0,88.88,29Z"/>
    <path fill="#e03040" d="M109.89,29a7.17,7.17,0,0,0-7.17,7.17V68.3a7.17,7.17,0,0,0,7.17,7.16h0a7.17,7.17,0,0,0,7.16-7.16V36.15A7.17,7.17,0,0,0,109.89,29Z"/>
  </svg>

  <div class="err-num">404</div>
  <h1 class="err-title">Verirrt, Stranger?</h1>
  <div class="err-divider"></div>
  <p class="err-desc">Diese Seite existiert nicht – oder wurde in eine andere Dimension entführt.</p>

  <div class="err-actions">
    <a href="index.html" class="btn btn-red">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      Zurück zur Startseite
    </a>
    <a href="kontakt.html" class="btn btn-outline">Kontakt</a>
  </div>
</main>

<footer class="err-footer">© 2026 FlyOriginals. Born Fly. Stay Original.</footer>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove', e => {
    mx=e.clientX; my=e.clientY;
    cursor.style.left=mx+'px'; cursor.style.top=my+'px';
  });
  (function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();
  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>{cursor.classList.add('hovered');ring.classList.add('hovered');});
    el.addEventListener('mouseleave',()=>{cursor.classList.remove('hovered');ring.classList.remove('hovered');});
  });

  // Deko-Fliegen im Hintergrund
  const bowSVG = `<svg viewBox="0 0 198.77 104.44" xmlns="http://www.w3.org/2000/svg"><path fill="#CC1020" d="M67.22,78.24,18.38,103.57c-7.07,3.09-14.77-2.29-15.91-11.15A319.7,319.7,0,0,1,0,52.23,319.9,319.9,0,0,1,2.48,12C3.61,3.16,11.29-2.2,18.34.88L67.22,26.22C71.92,28.27,75,33.59,75,39.54V64.92C75,70.87,71.92,76.19,67.22,78.24Z"/><path fill="#CC1020" d="M131.55,78.24l48.83,25.33c7.08,3.09,14.78-2.29,15.91-11.15a319.4,319.4,0,0,0,2.48-40.19A317.7,317.7,0,0,0,196.28,12C195.15,3.16,187.48-2.2,180.43.88L131.55,26.22c-4.7,2.05-7.82,7.37-7.82,13.32V64.92C123.73,70.87,126.85,76.19,131.55,78.24Z"/></svg>`;
  for(let i=0;i<8;i++){
    const d=document.createElement('div');
    d.className='deco-bow';
    const s=Math.random()*60+30;
    d.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${s}px;height:${s*0.53}px;--dur:${Math.random()*8+6}s;--del:${Math.random()*6}s;--rot:${Math.random()*40-20}deg;--op:${Math.random()*0.12+0.04};`;
    d.innerHTML=bowSVG;
    document.body.appendChild(d);
  }

  // Scroll progress
  const _spb = document.getElementById('scrollProgress');
  window.addEventListener('scroll', () => {
    const s = window.scrollY, m = document.documentElement.scrollHeight - window.innerHeight;
    if (_spb && m > 0) _spb.style.width = (s/m*100)+'%';
  }, { passive: true });


  // ── PAGE TRANSITION ──
  (function() {
    const ov = document.getElementById('pageTransition');
    const pf = document.getElementById('pt-fill');
    if (!ov) return;

    function hideOverlay() {
      ov.style.transition = 'opacity .45s ease';
      ov.style.opacity = '0';
      ov.style.pointerEvents = 'none';
      setTimeout(() => {
        ov.classList.remove('active');
        ov.style.cssText = '';
        if (pf) pf.style.width = '0%';
      }, 460);
    }

    function transIn() {
      // Force reset first (handles bfcache back navigation)
      ov.style.cssText = 'opacity:1;pointer-events:all;transition:none';
      ov.classList.add('active');
      if (pf) pf.style.width = '100%';
      setTimeout(hideOverlay, 150);
    }

    function transOut(href) {
      ov.style.cssText = 'opacity:1;pointer-events:all;transition:none';
      ov.classList.add('active');
      if (pf) pf.style.width = '0%';
      let p = 0;
      const iv = setInterval(() => {
        p += Math.random() * 12 + 8;
        if (p >= 100) {
          p = 100; clearInterval(iv);
          if (pf) pf.style.width = '100%';
          sessionStorage.setItem('ft_transit', '1'); setTimeout(() => window.location.href = href, 120);
          return;
        }
        if (pf) pf.style.width = p + '%';
      }, 55);
    }

    // Run on every page show (including bfcache back navigation)
    window.addEventListener('pageshow', (e) => {
      const wasTransition = sessionStorage.getItem('ft_transit');
      sessionStorage.removeItem('ft_transit');
      if (wasTransition || e.persisted) {
        transIn();
      } else {
        // Fresh load: just make sure overlay is fully hidden, no flash
        ov.style.cssText = 'opacity:0;pointer-events:none;transition:none';
        ov.classList.remove('active');
        if (pf) pf.style.width = '0%';
      }
    });

    // Intercept all .html link clicks
    document.addEventListener('click', (e) => {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href');
      if (href && !href.startsWith('#') && !href.startsWith('javascript') && href.endsWith('.html')) {
        e.preventDefault();
        transOut(href);
      }
    });
  })();


  // Cursor trail
  let _lt2 = 0;
  document.addEventListener('mousemove', e => {
    const now = Date.now(); if (now-_lt2<90) return; _lt2=now;
    const p=document.createElement('div'); p.className='trail-particle';
    p.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${Math.random()*3+2}px;height:${Math.random()*3+2}px;`;
    document.body.appendChild(p); setTimeout(()=>p.remove(),620);
  });
  // Page transition
  const _ov = document.getElementById('pageTransition');
  if (_ov) {
    _ov.style.cssText = 'opacity:1;transition:none';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      _ov.style.cssText = 'opacity:0;transition:opacity .4s ease';
    }));
    document.querySelectorAll('a[href]').forEach(l => {
      const h = l.getAttribute('href');
      if (h && !h.startsWith('#') && h.endsWith('.html')) {
        l.addEventListener('click', e => {
          e.preventDefault();
          _ov.style.cssText = 'opacity:1;pointer-events:all;transition:opacity .35s ease';
          setTimeout(() => window.location.href = h, 370);
        });
      }
    });
  }
  // Cursor trail
  let _lt = 0;
  document.addEventListener('mousemove', e => {
    const now = Date.now(); if (now - _lt < 90) return; _lt = now;
    const p = document.createElement('div'); p.className = 'trail-particle';
    p.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;width:${Math.random()*3+2}px;height:${Math.random()*3+2}px;`;
    document.body.appendChild(p); setTimeout(() => p.remove(), 620);
  });
</script>
</body>
</html>
